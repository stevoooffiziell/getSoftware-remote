<!DOCTYPE html>
<html lang="en-US">
<head>
<title>Timer</title>
</head>
<body>



<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stopp</button>
<button onclick="resetTimer()">Zurücksetzen</button>

<script>
let timerInterval;
let seconds = 0;
let minutes = 0;
let hours = 0;
const timerDisplay = document.getElementById('timer');

function startTimer() {
  timerInterval = setInterval(updateTimer, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function resetTimer() {
  stopTimer();
  seconds = 0;
  minutes = 0;
  hours = 0;
  updateDisplay();
}

function updateTimer() {
  seconds++;
  if (seconds === 60) {
    seconds = 0;
    minutes++;
    if (minutes === 60) {
      minutes = 0;
      hours++;
    }
  }
  updateDisplay();
}

function updateDisplay() {
  const formattedTime =
    (hours < 10 ? '0' + hours : hours) + ':' +
    (minutes < 10 ? '0' + minutes : minutes) + ':' +
    (seconds < 10 ? '0' + seconds : seconds);
  timerDisplay.textContent = formattedTime;
}
</script>

</body>
</html>
